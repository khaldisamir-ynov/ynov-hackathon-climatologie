services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: climafrance
      POSTGRES_USER: clima
      POSTGRES_PASSWORD: clima123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clima -d climafrance"]
      interval: 5s
      timeout: 3s
      retries: 10

  import-data:
    build: .
    entrypoint: ["python", "scripts/import_data.py"]
    command: []
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Data:/app/Data:ro
      - ./predictions_data:/app/predictions_data:ro
      - ./scripts:/app/scripts:ro
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: climafrance
      DB_USER: clima
      DB_PASSWORD: clima123

  climafrance:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./models:/app/models
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: climafrance
      DB_USER: clima
      DB_PASSWORD: clima123
    restart: unless-stopped

volumes:
  pgdata:
